general {

    gaps_in = 6
    gaps_out = 14

    border_size = 2

    resize_on_border = true

    layout = dwindle

    allow_tearing = false


    col.active_border = rgba(7a2cffcc)
    col.inactive_border = rgba(302040aa)
}


decoration {

    rounding = 10

    active_opacity = 0.95
    inactive_opacity = 0.85


    shadow {

        enabled = true

        range = 12
        render_power = 3
    }


    blur {

        enabled = true

        size = 8
        passes = 3

        vibrancy = 0.3

        ignore_opacity = true
        new_optimizations = true

        contrast = 1.1
        brightness = 0.9
        noise = 0.02
    }
}


misc {

    disable_hyprland_logo = true
    disable_splash_rendering = true

    force_default_wallpaper = 0

    mouse_move_enables_dpms = true
}
