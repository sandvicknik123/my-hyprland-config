# ======================
# BACKGROUND
# ======================

background {
    path = /home/danil/Pictures/wallpapers/a_cartoon_of_a_woman_sitting_on_a_building_with_a_cat_on_a_leash.jpg
}

# ======================
# CLOCK
# ======================

label {
    text = $TIME

    # +10% к размеру (было 72 → стало ~80)
    font_size = 90

    # нормальный жирный шрифт (если есть в системе)
    font_family = KogniGear

    # основной цвет (оставляем твой тёмный фиолет)
    color = rgba(110, 60, 180, 0.95)

    # "объём" через тень
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(20, 0, 40, 0.8)

    position = 0, 150
    halign = center
    valign = center
}

# ======================
# INPUT FIELD
# ======================

input-field {
    size = 320, 65
    outline_thickness = 2

    # глубокий тёмно-фиолетовый
    outer_color = rgba(90, 40, 150, 0.9)
    inner_color = rgba(10, 0, 20, 0.85)

    font_color = rgba(220, 200, 255, 1.0)

    fail_color = rgba(200, 60, 90, 1.0)
    check_color = rgba(140, 80, 220, 1.0)

    position = 0, -120
    halign = center
    valign = center
}
